name: EFI_BOOT_SERVICES
reference_link: "https://uefi.org/specs/UEFI/2.11/04_EFI_System_Table.html#efi-boot-services-table"
uefi_version: 2.11
fields:
  - name: Hdr
    type: EFI_TABLE_HEADER

  # Task Priority Services
  - name: RaiseTPL
    type: EFI_RAISE_TPL
  - name: RestoreTPL
    type: EFI_RESTORE_TPL

  # Memory Services
  - name: AllocatePages
    type: EFI_ALLOCATE_PAGES
  - name: FreePages
    type: EFI_FREE_PAGES
  - name: GetMemoryMap
    type: EFI_GET_MEMORY_MAP
  - name: AllocatePool
    type: EFI_ALLOCATE_POOL
  - name: FreePool
    type: EFI_FREE_POOL

  # Event & Timer Services
  - name: CreateEvent
    type: EFI_CREATE_EVENT
  - name: SetTimer
    type: EFI_SET_TIMER
  - name: WaitForEvent
    type: EFI_WAIT_FOR_EVENT
  - name: SignalEvent
    type: EFI_SIGNAL_EVENT
  - name: CloseEvent
    type: EFI_CLOSE_EVENT
  - name: CheckEvent
    type: EFI_CHECK_EVENT

  # Protocol Handler Services
  - name: InstallProtocolInterface
    type: EFI_INSTALL_PROTOCOL_INTERFACE
  - name: ReinstallProtocolInterface
    type: EFI_REINSTALL_PROTOCOL_INTERFACE
  - name: UninstallProtocolInterface
    type: EFI_UNINSTALL_PROTOCOL_INTERFACE
  - name: HandleProtocol
    type: EFI_HANDLE_PROTOCOL
  - name: Reserved
    type: VOID*
  - name: RegisterProtocolNotify
    type: EFI_REGISTER_PROTOCOL_NOTIFY
  - name: LocateHandle
    type: EFI_LOCATE_HANDLE
  - name: LocateDevicePath
    type: EFI_LOCATE_DEVICE_PATH
  - name: InstallConfigurationTable
    type: EFI_INSTALL_CONFIGURATION_TABLE

  # Image Services
  - name: LoadImage
    type: EFI_IMAGE_LOAD
  - name: StartImage
    type: EFI_IMAGE_START
  - name: Exit
    type: EFI_EXIT
  - name: UnloadImage
    type: EFI_IMAGE_UNLOAD
  - name: ExitBootServices
    type: EFI_EXIT_BOOT_SERVICES

  # Miscellaneous Services
  - name: GetNextMonotonicCount
    type: EFI_GET_NEXT_MONOTONIC_COUNT
  - name: Stall
    type: EFI_STALL
  - name: SetWatchdogTimer
    type: EFI_SET_WATCHDOG_TIMER

  # DriverSupport Services
  - name: ConnectController
    type: EFI_CONNECT_CONTROLLER
  - name: DisconnectController
    type: EFI_DISCONNECT_CONTROLLER

  # Open and Close Protocol Services
  - name: OpenProtocol
    type: EFI_OPEN_PROTOCOL
  - name: CloseProtocol
    type: EFI_CLOSE_PROTOCOL
  - name: OpenProtocolInformation
    type: EFI_OPEN_PROTOCOL_INFORMATION

  # Library Services
  - name: ProtocolsPerHandle
    type: EFI_PROTOCOLS_PER_HANDLE
  - name: LocateHandleBuffer
    type: EFI_LOCATE_HANDLE_BUFFER
  - name: LocateProtocol
    type: EFI_LOCATE_PROTOCOL
  - name: InstallMultipleProtocolInterfaces
    type: EFI_INSTALL_MULTIPLE_PROTOCOL_INTERFACES
  - name: UninstallMultipleProtocolInterfaces
    type: EFI_UNINSTALL_MULTIPLE_PROTOCOL_INTERFACES

  # 32-bit CRC Services
  - name: CalculateCrc32
    type: EFI_CALCULATE_CRC32

  # Miscellaneous Services
  - name: CopyMem
    type: EFI_COPY_MEM
  - name: SetMem
    type: EFI_SET_MEM
  - name: CreateEventEx
    type: EFI_CREATE_EVENT_EX
